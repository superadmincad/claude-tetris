<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Cambiar tema claro/oscuro" aria-pressed="false" title="Cambiar tema claro/oscuro">🌙</button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">HOLD</span>
          <canvas id="hold-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>C</kbd>/<kbd>Shift</kbd> reservar</li>
            <li><kbd>P</kbd>/<kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box" id="gameover-box">
        <p class="overlay-title" id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn" class="menu-btn">Reiniciar</button>
      </div>

      <div class="overlay-box hidden" id="pause-menu">
        <p class="overlay-title">PAUSA</p>

        <div class="pause-actions">
          <button id="resume-btn" class="menu-btn">Reanudar</button>
          <button id="pause-restart-btn" class="menu-btn">Reiniciar</button>
          <button id="controls-toggle-btn" class="menu-btn">Ver controles</button>
        </div>

        <div id="pause-controls" class="controls hidden">
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>C</kbd>/<kbd>Shift</kbd> reservar</li>
            <li><kbd>P</kbd>/<kbd>Esc</kbd> pausa</li>
          </ul>
        </div>

        <div class="pause-level">
          <span class="label">NIVEL INICIAL</span>
          <div class="level-selector">
            <button id="level-down-btn" aria-label="Disminuir nivel inicial">−</button>
            <span id="start-level-value">1</span>
            <button id="level-up-btn" aria-label="Aumentar nivel inicial">+</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
