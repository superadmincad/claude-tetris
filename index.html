<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Cambiar tema claro/oscuro" aria-pressed="false" title="Cambiar tema claro/oscuro">🌙</button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">HOLD</span>
          <canvas id="hold-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>C</kbd>/<kbd>Shift</kbd> reservar</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="go-extra">
          <div id="new-record-form" class="hidden">
            <label for="player-name">¡Nuevo récord! Tu nombre:</label>
            <input type="text" id="player-name" maxlength="10" placeholder="AAA" autocomplete="off" />
            <button id="save-record-btn">Guardar</button>
          </div>

          <div class="stats-summary">
            <span>Mejor combo <b id="overlay-best-combo">0</b></span>
            <span>Máx. líneas <b id="overlay-max-lines">0</b></span>
          </div>

          <div class="records-table">
            <h3>TOP 5</h3>
            <ol id="records-list" class="records-list"></ol>
          </div>

          <button id="reset-records-btn" class="reset-btn">Resetear récords</button>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="start-screen" class="overlay">
      <div class="overlay-box">
        <p class="start-heading">TETRIS</p>

        <div class="stats-summary">
          <span>Mejor combo <b id="start-best-combo">0</b></span>
          <span>Máx. líneas <b id="start-max-lines">0</b></span>
        </div>

        <div class="records-table">
          <h3>TOP 5</h3>
          <ol id="start-records-list" class="records-list"></ol>
        </div>

        <button id="start-btn">Jugar</button>
        <button id="reset-records-start-btn" class="reset-btn">Resetear récords</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
