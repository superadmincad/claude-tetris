<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Cambiar tema claro/oscuro" aria-pressed="false" title="Cambiar tema claro/oscuro">🌙</button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">HOLD</span>
          <canvas id="hold-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>C</kbd>/<kbd>Shift</kbd> reservar</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="highscore-form" class="highscore-form hidden">
          <label for="player-name">Nombre</label>
          <input type="text" id="player-name" maxlength="12" placeholder="Tu nombre" autocomplete="off" />
          <button id="save-score-btn">Guardar</button>
        </div>

        <div id="highscore-panel" class="highscore-panel hidden">
          <span class="label">RÉCORDS</span>
          <div class="highscore-table-wrap">
            <table class="highscore-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Nombre</th>
                  <th>Puntos</th>
                  <th>Líneas</th>
                  <th>Combo</th>
                  <th>Fecha</th>
                </tr>
              </thead>
              <tbody id="highscore-body"></tbody>
            </table>
          </div>
          <button id="reset-scores-btn" class="reset-scores-btn">Resetear récords</button>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="start-screen" class="overlay">
      <div class="overlay-box">
        <p class="start-title">TETRIS</p>

        <div class="highscore-panel">
          <span class="label">RÉCORDS</span>
          <div class="highscore-table-wrap">
            <table class="highscore-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Nombre</th>
                  <th>Puntos</th>
                  <th>Líneas</th>
                  <th>Combo</th>
                  <th>Fecha</th>
                </tr>
              </thead>
              <tbody id="start-highscore-body"></tbody>
            </table>
          </div>
          <button id="start-reset-scores-btn" class="reset-scores-btn">Resetear récords</button>
        </div>

        <button id="play-btn">Jugar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
